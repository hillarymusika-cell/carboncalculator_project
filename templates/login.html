{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block style %}
<link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
{% endblock %}
{% block content %}
<form id="login-form" action="{{ url_for('auth.login') }}" method="post" accept-charset="utf-8" novalidate>
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
  <div class="container">
    <div class="box">
      <div class="box-login" id="login">
        <div class="login-header">
          <h2>Cosmic Systems</h2>
          <small>Welcome</small>
        </div>

        <div class="input-group">
          <div class="input-field">
            <input type="email" name="login-email" id="login-email" class="input-box" placeholder=" " required />
            <label for="login-email">Email address</label>
          </div>

          <div class="input-field">
            <input type="password" name="login-password" id="login-password" class="password-box" placeholder=" " required />
            <label for="login-password">Password</label>
            <div class="eye-area">
              <button type="button" class="eye-area-box" id="toggle-password" aria-label="Show password">
                <i class="fa-regular fa-eye" id="toggle-password-icon"></i>
              </button>
            </div>
          </div>

          <div class="remember">
            <input type="checkbox" name="formcheck" id="formcheck" class="check" />
            <label for="formcheck">Remember Me</label>
          </div>

          <div class="input-field">
            <input type="submit" id="input-signin" value="Sign in" class="input-submit" />
          </div>

          <div class="input-field">
            <a href="{{ url_for('auth.signup') }}" id="input-signup" class="input-submit as-link">Don't have an account? Sign up</a>
          </div>

          <div class="input-field">
            <button type="button" id="google-sign" class="input-submit google">Continue with Google</button>
          </div>

          <div class="forgot" id="forgot">
            <a href="#">Forgot Password</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</form>

<script>
  window.APP_ROUTES = {
    homeUrl: "{{ url_for('views.home') }}"
  };
</script>
<script src="{{ url_for('static', filename='login.js') }}"></script>
{% endblock %}
