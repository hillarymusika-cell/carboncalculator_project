{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block style %}
<link rel="stylesheet" href="{{ url_for('static', filename='signup.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
{% endblock %}
{% block content %}
<form id="signup-form" action="{{ url_for('auth.signup') }}" method="post" accept-charset="utf-8" novalidate>
  <div class="container">
    <div class="box">
      <div class="box-login" id="login">
        <div class="login-header">
          <h2>Sign Up</h2>
          <small>Welcome</small>
        </div>

        <div class="input-group">
          <div class="input-field">
            <input type="email" name="login-email" id="login-email" class="input-box" placeholder=" " required />
            <label for="login-email">Email address</label>
          </div>

          <div class="input-field">
            <input type="password" name="login-password" id="login-password" class="password-box" placeholder=" " minlength="8" required />
            <label for="login-password">Create password</label>
            <div class="eye-area">
              <button type="button" class="eye-area-box" id="toggle-password" aria-label="Show password">
                <i class="fa-regular fa-eye" id="toggle-password-icon"></i>
              </button>
            </div>
          </div>

          <div class="input-field">
            <input type="password" name="confirm-password" id="confirm-password" class="password-box" placeholder=" " minlength="8" required />
            <label for="confirm-password">Confirm password</label>
            <div class="eye-area">
              <button type="button" class="eye-area-box" id="toggle-confirm-password" aria-label="Show password">
                <i class="fa-regular fa-eye" id="toggle-confirm-password-icon"></i>
              </button>
            </div>
          </div>
          <p class="field-error" id="password-mismatch" hidden>Passwords do not match.</p>

          <div class="remember">
            <input type="checkbox" name="formcheck" id="formcheck" class="check" />
            <label for="formcheck">Remember Me</label>
          </div>

          <div class="input-field">
            <input type="submit" id="input-signup" value="Create Account" class="input-submit" />
          </div>

          <div class="input-field">
            <button type="button" id="google-sign" class="input-submit google">Continue with Google</button>
          </div>

          <div class="have" id="alt-tex">
            <h4>Already have an account?</h4>
          </div>
          <div id="have" class="have">
            <a href="{{ url_for('auth.login') }}">Sign in to proceed</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</form>

<script>
  window.APP_ROUTES = {
    homeUrl: "{{ url_for('views.home') }}"
  };
</script>
<script src="{{ url_for('static', filename='signup.js') }}"></script>
{% endblock %}
